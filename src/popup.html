<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Open Passwords</title>
  </head>
  <body>
    <header>
      <img src="../icons/icon48.png" alt="" width="20" height="20" />
      <h1>Open Passwords</h1>
      <button id="refresh" class="icon" title="Refresh passwords" aria-label="Refresh passwords" hidden>&#x21bb;</button>
      <span id="dot" class="dot" title="status"></span>
    </header>

    <main>
      <!-- No native helper -->
      <section id="view-nohelper" hidden>
        <p class="msg">
          Couldn't reach Apple's password helper. This needs macOS 14+ with the
          Passwords app, and the extension must run with Apple's accepted ID.
        </p>
      </section>

      <!-- Needs PIN -->
      <section id="view-pin" hidden>
        <p class="msg">
          A verification code was generated on your Mac. Enter it to grant access.
        </p>
        <input id="pin" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="••••••" />
        <button id="verify" class="primary">Unlock</button>
        <button id="newcode" class="link">Request a new code</button>
        <p id="pin-error" class="error" hidden></p>
      </section>

      <!-- Connecting -->
      <section id="view-connecting" hidden>
        <p class="msg">Connecting to Apple Passwords…</p>
      </section>

      <!-- Unlocked: logins for current site -->
      <section id="view-unlocked" hidden>
        <p id="site" class="site"></p>
        <ul id="logins" class="logins"></ul>
        <p id="nologins" class="msg" hidden>No saved passwords for this site.</p>
        <p id="refresh-note" class="note" hidden></p>
      </section>
    </main>

    <!-- Footer: toggles for the browser's own password/autofill features -->
    <footer>
      <label id="pm-row" class="switch-row" hidden>
        <span>Hide browser save-password bubble<span id="pm-note" class="subnote"></span></span>
        <input type="checkbox" id="pm-toggle" class="switch" />
      </label>
      <label id="policy-row" class="switch-row">
        <span>Hide browser password manager entirely<span id="policy-note" class="subnote"></span></span>
        <input type="checkbox" id="policy-toggle" class="switch" />
      </label>
      <label id="af-row" class="switch-row" hidden>
        <span>Hide browser autofill suggestions<span id="af-note" class="subnote"></span></span>
        <input type="checkbox" id="af-toggle" class="switch" />
      </label>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
